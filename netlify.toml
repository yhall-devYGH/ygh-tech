[build]
  publish = "."

# ── Asset caching ──
[[headers]]
  for = "/styles.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/logo.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# ── Security headers ──
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options            = "DENY"
    X-Content-Type-Options     = "nosniff"
    X-XSS-Protection           = "1; mode=block"
    Referrer-Policy            = "strict-origin-when-cross-origin"
    Permissions-Policy         = "camera=(), microphone=(), geolocation=()"

# ── Redirects ──
[[redirects]]
  from   = "/home"
  to     = "/"
  status = 301
  force  = false

[[redirects]]
  from   = "/blog"
  to     = "/hub.html"
  status = 301
  force  = false

# ── Force HTTPS ──
[[redirects]]
  from   = "http://yghtech.com/*"
  to     = "https://www.yghtech.com/:splat"
  status = 301
  force  = true

[[redirects]]
  from   = "http://www.yghtech.com/*"
  to     = "https://www.yghtech.com/:splat"
  status = 301
  force  = true

[[redirects]]
  from   = "https://yghtech.com/*"
  to     = "https://www.yghtech.com/:splat"
  status = 301
  force  = true

[[redirects]]
  from   = "/*"
  to     = "/404.html"
  status = 404
